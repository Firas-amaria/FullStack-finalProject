<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointment Booking</title>
    <link rel="stylesheet" href="css/styles.css">
<style>#logout-btn,
    #create-appointment-btn {
        background-color: #0dad4a;
        color: white;
        border: none;
        padding: 10px 15px;
        font-size: 16px;
        cursor: pointer;
        border-radius: 5px;
        transition: 0.3s;
    }

    #logout-btn {
        background-color: #dc3545;
    }

    #logout-btn:hover {
        background-color: #c82333;
    }

    #create-appointment-btn:hover {
        background-color: #0b8c3c;
    }

    .container {
        max-width: 80%;
        padding: 30px;
    }

    h2 {
        margin-top: 20px;
        border-bottom: 2px solid #0dad4a;
        padding-bottom: 5px;
        text-align: left;
    }

    .grid-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 20px;
        margin-top: 20px;
    }

    .card {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
        text-align: left;
        border-left: 6px solid #0dad55;
        transition: transform 0.2s ease-in-out;
    }

    .card:hover {
        transform: scale(1.03);
    }

    .btn-delete {
        background-color: #dc3545;
        color: white;
        padding: 8px 12px;
        border-radius: 5px;
        border: none;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 10px;
    }

    .btn-delete:hover {
        background-color: #c82333;
    }

    #admin-section {
        display: none;
    }
</style>
</head>
<body>
    <header>
        <h1>Book an Appointment</h1>
        <nav>
            <ul>
                <li><a href="profile.html">Profile Page</a></li>
                <li><a href="appointments.html">Book Appointment</a></li>
                <li><a href="chat.html">Chat with Medical Bot</a></li>
            </ul>
        </nav>
    </header>
    
    <section class="appointment-form">
        <h2>Choose an Appointment</h2>
        <form id="appointmentForm">
            <label for="medicalField">Medical Field:</label>
            <select id="medicalField" required>
                <option value="" disabled selected>Select Medical Field</option>
                <option value="Pediatrics">Pediatrics</option>
                <option value="Family Medicine">Family Medicine</option>
                <option value="Orthopedics">Orthopedics</option>
                <option value="Neurology">Neurology</option>
                <option value="Emergency Medicine">Emergency Medicine</option>
            </select>
            
            <label for="appointmentDate">Date:</label>
            <input type="date" id="appointmentDate" required>
            
            <label for="appointmentTime">Time:</label>
            <input type="time" id="appointmentTime" required>
            
            <button type="submit">Book Appointment</button>
        </form>
        <div id="confirmationMessage" style="display:none;">
            <h3>Appointment Booked Successfully!</h3>
            <p>Medical Field: <span id="confirmMedicalField"></span></p>
            <p>Date: <span id="confirmAppointmentDate"></span></p>
            <p>Time: <span id="confirmAppointmentTime"></span></p>
        </div>
    </section>
    
    <footer>
        <p>&copy; 2025 Medical Appointment Management System</p>
    </footer>
    
    <script src="appointments.js"></script>
</body>
</html>
