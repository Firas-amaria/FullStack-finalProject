<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Appointment</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .container {
            max-width: 50%;
            min-width: 400px;
            margin: 50px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
        }

        label {
            display: block;
            margin: 10px 0 5px;
            font-weight: bold;
        }

        select,
        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            background-color: #007bff;
            color: white;
            padding: 10px;
            font-size: 16px;
            border: none;
            cursor: pointer;
            margin-top: 15px;
            border-radius: 5px;
        }

        button:hover {
            background-color: #0b8c3c;
        }

        .cancel-btn {
            background-color: #dc3545;
        }

        .cancel-btn:hover {
            background-color: #c82333;
        }
    </style>
</head>

<body>
    <header>
        <span>Create New Appointment</span>
        <button id="logout-btn">Logout</button>
    </header>

    <div class="container">
        <h2>Book an Appointment</h2>

        <label for="doctor-select">Select Doctor:</label>
        <select id="doctor-select">
            <option value="">Loading doctors...</option>
        </select>

        <label for="appointment-details">Appointment Details:</label>
        <input type="text" id="appointment-details" placeholder="Enter details (e.g., reason for visit)">


        <label for="appointment-date">Select Date:</label>
        <input type="date" id="appointment-date">

        <label for="appointment-time">Select Time:</label>
        <input type="time" id="appointment-time">

        <button id="submit-appointment">Create Appointment</button>
        <button class="cancel-btn" onclick="window.location.href='patient_appointments.html'">Cancel</button>

        <p id="message" style="color: green;"></p>
    </div>

    <script src="js/patient_create_appointment.js"></script>
</body>

</html>
