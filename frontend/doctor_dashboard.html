<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .appointment-card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0px 2px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 15px;
            border-left: 5px solid #0dad4a;
        }

        .appointment-card p {
            margin: 5px 0;
        }

        .actions {
            margin-top: 10px;
        }

        button {
            padding: 8px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-right: 10px;
        }

        .complete-btn {
            background-color: #0dad4a;
            color: white;
        }

        .cancel-btn {
            background-color: #dc3545;
            color: white;
        }

        .complete-btn:hover {
            background-color: #0b8c3c;
        }

        .cancel-btn:hover {
            background-color: #c82333;
        }
    </style>
</head>

<body>
    <header>
        <span>Doctor Dashboard</span>
        <button id="logout-btn">Logout</button>
    </header>

    <div class="container">
        <h2>Upcoming Appointments</h2>
        <div class="grid-container" id="appointments-list">
            <p>Loading appointments...</p>
        </div>
    </div>

    <script src="js/doctor_dashboard.js"></script>
</body>

</html>
