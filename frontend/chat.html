<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat AI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .chat-container {
            width: 350px;
            background-color: white;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .chat-box {
            height: 400px;
            overflow-y: auto;
            padding: 10px;
            border-bottom: 1px solid #ddd;
            display: flex;
            flex-direction: column;
        }

        .input-box {
            display: flex;
            padding: 10px;
            background-color: #f0f0f0;
        }

        .input-box input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .input-box button {
            margin-left: 10px;
            padding: 8px 15px;
            border: none;
            background-color: #007bff;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .input-box button:hover {
            background-color: #0056b3;
        }

        .message {
            padding: 10px;
            border-radius: 8px;
            margin: 5px 0;
            max-width: 80%;
            word-wrap: break-word;
        }

        .user-message {
            background-color: #007bff;
            color: white;
            align-self: flex-end;
        }

        .bot-message {
            background-color: #e0e0e0;
            align-self: flex-start;
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-box" id="chat-box">
        <!-- Messages will appear here -->
    </div>
    <div class="input-box">
        <input type="text" id="user-input" placeholder="הקלד הודעה...">
        <button onclick="sendMessage()">שלח</button>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const chatBox = document.getElementById("chat-box");
        const userInput = document.getElementById("user-input");

        /**
         * Send message to chatbot API
         */
        window.sendMessage = async () => {
            const message = userInput.value.trim();
            if (message === "") return;

            // Add user message to chat
            addMessage(message, "user-message");

            // Clear input field
            userInput.value = "";

            try {
                const response = await fetch("http://localhost:3000/chat/send", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IjY3Yjc1NzM4NWE0MmNiYWU3ZGZjZDg2MiIsIm5hbWUiOiJKb2huIERvZSIsInJvbGUiOiJ1c2VyIiwiaWF0IjoxNzQwODY4NDgyLCJleHAiOjE3NDA4NzIwODJ9.gv16GxEpZMcxb7K1CzHdb_gX-hk8QAK9bbo8nKsvqgA"
                    },
                    body: JSON.stringify({ message })
                });

                const data = await response.json();
                addMessage(data.botMessage, "bot-message");
            } catch (error) {
                addMessage("❌ שגיאה בהתחברות לשרת", "bot-message");
            }
        };

        /**
         * Add a message to the chatbox
         */

        function addMessage(text, className) {
            const msgDiv = document.createElement("div");
            msgDiv.classList.add("message", className);
            msgDiv.textContent = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight; // Scroll to latest message
        }
    });
</script>
</body>
</html>
