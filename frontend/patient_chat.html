<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with Medical Bot</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .container {
            max-width: 80%;
            margin: 50px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
        }

        #logout-btn,
        #create-appointment-btn {
            background-color: #0dad4a;
            color: white;
            border: none;
            padding: 10px 15px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
        }

        .home-btn {
            background-color: #07632a;
            color: white;
            border: none;
            padding: 10px 15px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
        }

        .home-btn:hover {
            background-color: #1e5031;
        }

        #logout-btn {
            background-color: #dc3545;
        }

        #logout-btn:hover {
            background-color: #c82333;
        }

        #create-appointment-btn:hover {
            background-color: #0b8c3c;
        }


        h2 {
            margin-top: 20px;
            border-bottom: 2px solid #0dad4a;
            padding-bottom: 5px;
            text-align: left;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
            text-align: left;
            border-left: 6px solid #0dad55;
            transition: transform 0.2s ease-in-out;
        }

        .card:hover {
            transform: scale(1.03);
        }

        .btn-delete {
            background-color: #dc3545;
            color: white;
            padding: 8px 12px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-delete:hover {
            background-color: #c82333;
        }

        #admin-section {
            display: none;
        }

        .chat-container {
            width: 100%;
            background-color: white;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .chat-box {
            height: 400px;
            overflow-y: auto;
            padding: 10px;
            border-bottom: 1px solid #ddd;
            display: flex;
            flex-direction: column;
        }

        .input-box {
            display: flex;
            padding: 10px;
            background-color: #f0f0f0;
        }

        .input-box input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .input-box button {
            margin-left: 10px;
            padding: 8px 15px;
            border: none;
            background-color: #007bff;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .input-box button:hover {
            background-color: #0056b3;
        }

        .message {
            padding: 10px;
            border-radius: 8px;
            margin: 5px 0;
            max-width: 80%;
            word-wrap: break-word;
        }

        .user-message {
            background-color: #007bff;
            color: white;
            align-self: flex-end;
        }

        .bot-message {
            background-color: #e0e0e0;
            align-self: flex-start;
        }

        button {
            background-color: #007bff;
            color: white;
            padding: 10px;
            font-size: 16px;
            border: none;
            cursor: pointer;
            margin-top: 15px;
            border-radius: 5px;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>
    <header>
        <span>Patient Dashboard</span>
        <button class="home-btn" onclick="window.location.href='patient_dashboard.html'">back to Dashboard</button>
        <button id="logout-btn">Logout</button>
    </header>

    <div class="container">
        <div class="chat-container">
            <div class="chat-box" id="chat-box">
                <!-- Messages will appear here -->
            </div>
            <div class="input-box">
                <input type="text" id="user-input" placeholder="הקלד הודעה...">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
        <button onclick="window.location.href='patient_create_appointment.html'">Craete a new appointment</button>
    </div>


    <footer>
        <p>&copy; 2025 Medical Appointment Management System</p>
    </footer>
    <script src="js/chat.js"></script>
</body>

</html>
