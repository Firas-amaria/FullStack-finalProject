<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | LMS</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        #logout-btn,
        #create-appointment-btn {
            background-color: #0dad4a;
            color: white;
            border: none;
            padding: 10px 15px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
        }

        #logout-btn {
            background-color: #dc3545;
        }

        #logout-btn:hover {
            background-color: #c82333;
        }

        #create-appointment-btn:hover {
            background-color: #0b8c3c;
        }

        .container {
            max-width: 80%;
            padding: 30px;
        }

        h2 {
            margin-top: 20px;
            border-bottom: 2px solid #0dad4a;
            padding-bottom: 5px;
            text-align: left;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
            text-align: left;
            border-left: 6px solid #0dad55;
            transition: transform 0.2s ease-in-out;
        }

        .card:hover {
            transform: scale(1.03);
        }

        .btn-delete {
            background-color: #dc3545;
            color: white;
            padding: 8px 12px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-delete:hover {
            background-color: #c82333;
        }

        #admin-section {
            display: none;
        }

        .btn-promote {
            background-color: #0dad3d;
            color: white;
            padding: 8px 12px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;

        }

        .btn-demote {
            background-color: #dca735;
            color: white;
            padding: 8px 12px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <header>
        <span>Dashboard</span>
        <button id="logout-btn">Logout</button>
    </header>

    <div class="container">
        <h1>Welcome, <span id="username"></span></h1>

        <div id="admin-section">
            <h2>All Users</h2>
            <div id="user-list" class="grid-container"></div>

            <button id="create-appointment-btn">Create Appointment</button>
        </div>


    </div>

    <script src="js/admin_controller.js"></script>
</body>

</html>
