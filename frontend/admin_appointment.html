<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Appointment | Admin</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .container {
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }

        input,
        select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            background-color: #0dad4a;
            color: white;
            border: none;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
            border-radius: 5px;
        }

        button:hover {
            background-color: #0b8c3c;
        }
    </style>
</head>

<body>
    <header>
        <span id="dashboard-link" style="cursor: pointer; text-decoration: underline;">Dashboard</span>
        <button id="logout-btn">Logout</button>
    </header>

    <div class="container">
        <h2>Create New Appointment</h2>

        <label for="patient-select">Select Patient:</label>
        <select id="patient-select">
            <option value="">Loading patients...</option>
        </select>

        <label for="doctor-name">Doctor Name:</label>
        <input type="text" id="doctor-name" placeholder="Enter Doctor's Name">

        <label for="specialty">Specialty:</label>
        <input type="text" id="specialty" placeholder="Enter Specialty">

        <label for="appointment-date">Select Date:</label>
        <input type="date" id="appointment-date">

        <label for="appointment-time">Select Time:</label>
        <input type="time" id="appointment-time">

        <button id="submit-appointment">Create Appointment</button>
        <p id="message" style="color: green;"></p>
    </div>

    <script src="js/admin_appointment.js"></script>

</body>

</html>
